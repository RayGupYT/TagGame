<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tag Game</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #000; font-family: 'Segoe UI', Arial, sans-serif; }
    canvas { display: block; }

    #login-screen {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      display: flex; align-items: center; justify-content: center;
      z-index: 100; flex-direction: column;
    }
    #login-screen h1 { color: #e94560; font-size: 48px; margin-bottom: 30px; text-shadow: 0 0 20px rgba(233,69,96,0.5); }
    #login-screen input {
      padding: 14px 24px; font-size: 20px; border: 2px solid #e94560;
      border-radius: 8px; background: rgba(255,255,255,0.1); color: white;
      outline: none; width: 300px; text-align: center;
    }
    #login-screen input::placeholder { color: rgba(255,255,255,0.4); }
    #login-screen button {
      margin-top: 16px; padding: 14px 40px; font-size: 18px; font-weight: bold;
      border: none; border-radius: 8px; background: #e94560; color: white;
      cursor: pointer; transition: transform 0.1s;
    }
    #login-screen button:hover { transform: scale(1.05); }

    #tagger-banner {
      position: fixed; top: 0; left: 0; width: 100%;
      padding: 12px; text-align: center; font-size: 22px; font-weight: bold;
      z-index: 50; pointer-events: none; display: none;
    }
    #tagger-banner.is-tagger {
      background: rgba(255, 30, 30, 0.85); color: white;
    }
    #tagger-banner.not-tagger {
      background: rgba(0, 0, 0, 0.6); color: white;
    }

    #chat-container {
      position: fixed; bottom: 10px; left: 10px; width: 350px; z-index: 50;
    }
    #chat-log {
      width: 100%; max-height: 150px;
      overflow-y: auto; pointer-events: none;
    }
    .chat-msg {
      color: white; background: rgba(0,0,0,0.5); padding: 4px 8px;
      margin-top: 3px; border-radius: 4px; font-size: 14px;
    }
    .chat-msg .chat-name { font-weight: bold; color: #e94560; }
    #chat-input {
      width: 100%; padding: 8px 12px; margin-top: 4px;
      background: rgba(0,0,0,0.7); border: 1px solid rgba(255,255,255,0.2);
      border-radius: 6px; color: white; font-size: 14px; outline: none;
      display: none;
    }
    #chat-input::placeholder { color: rgba(255,255,255,0.4); }
    #chat-hint {
      color: rgba(255,255,255,0.3); font-size: 12px; margin-top: 4px;
      pointer-events: none;
    }

    #round-timer {
      position: fixed; top: 50px; left: 50%; transform: translateX(-50%);
      color: white; background: rgba(0,0,0,0.6); padding: 8px 20px;
      border-radius: 8px; font-size: 20px; font-weight: bold;
      z-index: 50; pointer-events: none; display: none; text-align: center;
    }

    #leaderboard {
      position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
      background: rgba(0,0,0,0.85); border: 2px solid #e94560; border-radius: 12px;
      padding: 20px 30px; z-index: 70; display: none; min-width: 320px;
      pointer-events: none;
    }
    #leaderboard h2 {
      color: #e94560; text-align: center; margin: 0 0 12px 0; font-size: 24px;
    }
    #leaderboard .lb-row {
      display: flex; justify-content: space-between; padding: 6px 0;
      border-bottom: 1px solid rgba(255,255,255,0.1); color: white; font-size: 16px;
    }
    #leaderboard .lb-row:last-child { border-bottom: none; }
    #leaderboard .lb-rank { color: #999; width: 30px; }
    #leaderboard .lb-name { flex: 1; }
    #leaderboard .lb-time { color: #e94560; font-weight: bold; }
    #leaderboard .lb-row.winner { color: #ffd700; }
    #leaderboard .lb-row.winner .lb-time { color: #ffd700; }
    #leaderboard .lb-winner-label {
      text-align: center; color: #ffd700; font-size: 28px; font-weight: bold;
      margin-bottom: 10px;
    }

    #phase-overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      display: none; align-items: center; justify-content: center;
      z-index: 60; pointer-events: none; flex-direction: column;
    }
    #phase-overlay .phase-text {
      color: white; font-size: 42px; font-weight: bold;
      text-shadow: 0 0 20px rgba(0,0,0,0.8); text-align: center;
    }
    #phase-overlay .phase-sub {
      color: rgba(255,255,255,0.7); font-size: 20px; margin-top: 10px;
      text-shadow: 0 0 10px rgba(0,0,0,0.8);
    }

    #player-count {
      position: fixed; top: 50px; right: 15px; color: white;
      background: rgba(0,0,0,0.5); padding: 6px 12px; border-radius: 6px;
      font-size: 14px; z-index: 50; pointer-events: none; display: none;
    }

    #live-leaderboard {
      position: fixed; top: 50px; left: 15px;
      background: rgba(0,0,0,0.6); border-radius: 8px;
      padding: 8px 12px; z-index: 50; pointer-events: none;
      display: none; min-width: 180px;
    }
    #live-leaderboard .live-lb-title {
      color: rgba(255,255,255,0.5); font-size: 11px; text-transform: uppercase;
      letter-spacing: 1px; margin-bottom: 4px;
    }
    #live-leaderboard .live-lb-row {
      display: flex; justify-content: space-between; padding: 2px 0;
      font-size: 13px; color: white;
    }
    #live-leaderboard .live-lb-row.is-tagger { color: #ff4444; }
    #live-leaderboard .live-lb-row.is-me { color: #4ac1ff; }
    #live-leaderboard .live-lb-time {
      font-family: monospace; margin-left: 12px; opacity: 0.8;
    }

    #controls-btn {
      position: fixed; bottom: 15px; right: 15px; width: 36px; height: 36px;
      background: rgba(0,0,0,0.6); border: 1px solid rgba(255,255,255,0.3);
      border-radius: 8px; color: white; font-size: 20px; cursor: pointer;
      z-index: 55; display: none; align-items: center; justify-content: center;
      transition: background 0.2s;
    }
    #controls-btn:hover { background: rgba(255,255,255,0.2); }

    #controls-panel {
      position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
      background: rgba(0,0,0,0.9); border: 2px solid rgba(255,255,255,0.2);
      border-radius: 12px; padding: 24px 32px; z-index: 80; display: none;
      min-width: 300px; max-width: 400px;
    }
    #controls-panel h2 {
      color: #e94560; margin: 0 0 16px 0; font-size: 22px; text-align: center;
    }
    .ctrl-row {
      display: flex; justify-content: space-between; padding: 6px 0;
      border-bottom: 1px solid rgba(255,255,255,0.08); color: white; font-size: 14px;
    }
    .ctrl-row:last-child { border-bottom: none; }
    .ctrl-key {
      background: rgba(255,255,255,0.15); padding: 2px 8px; border-radius: 4px;
      font-family: monospace; font-size: 13px; color: #e94560;
    }
    .ctrl-section {
      color: rgba(255,255,255,0.4); font-size: 12px; text-transform: uppercase;
      margin-top: 12px; margin-bottom: 4px; letter-spacing: 1px;
    }
    #controls-close {
      display: block; margin: 16px auto 0; padding: 8px 24px;
      background: #e94560; border: none; border-radius: 6px;
      color: white; font-size: 14px; cursor: pointer;
    }
  </style>
</head>
<body>
  <div id="login-screen">
    <h1>TAG GAME</h1>
    <input type="text" id="username-input" placeholder="Enter your username" maxlength="20" autofocus>
    <button id="play-btn">PLAY</button>
  </div>

  <div id="tagger-banner"></div>
  <div id="leaderboard"></div>
  <div id="round-timer"></div>
  <div id="phase-overlay"><div class="phase-text"></div><div class="phase-sub"></div></div>
  <div id="chat-container">
    <div id="chat-log"></div>
    <input type="text" id="chat-input" placeholder="Type a message..." maxlength="100">
    <div id="chat-hint">Press T to chat</div>
  </div>
  <div id="live-leaderboard"></div>
  <div id="player-count"></div>
  <div id="controls-btn">&#9881;</div>
  <div id="controls-panel">
    <h2>CONTROLS</h2>
    <div class="ctrl-section">Movement</div>
    <div class="ctrl-row"><span>Move</span><span><span class="ctrl-key">W</span> <span class="ctrl-key">A</span> <span class="ctrl-key">S</span> <span class="ctrl-key">D</span></span></div>
    <div class="ctrl-row"><span>Look around</span><span class="ctrl-key">Mouse</span></div>
    <div class="ctrl-row"><span>Jump</span><span class="ctrl-key">Space</span></div>
    <div class="ctrl-row"><span>Crouch (toggle)</span><span class="ctrl-key">C</span></div>
    <div class="ctrl-section">Communication</div>
    <div class="ctrl-row"><span>Open chat</span><span class="ctrl-key">T</span></div>
    <div class="ctrl-row"><span>Send message</span><span class="ctrl-key">Enter</span></div>
    <div class="ctrl-row"><span>Cancel chat</span><span class="ctrl-key">Esc</span></div>
    <div class="ctrl-row"><span>Emote "67"</span><span class="ctrl-key">1</span></div>
    <div class="ctrl-row"><span>Emote "L"</span><span class="ctrl-key">2</span></div>
    <div class="ctrl-section">Tips</div>
    <div class="ctrl-row"><span>Teleporter pads</span><span>Walk onto purple pads</span></div>
    <div class="ctrl-row"><span>Powerups</span><span>Walk into orbs</span></div>
    <div class="ctrl-row"><span>Tagger is 10% faster</span><span style="color:#ff4444">RED player</span></div>
    <button id="controls-close">CLOSE</button>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="game.js"></script>
</body>
</html>
